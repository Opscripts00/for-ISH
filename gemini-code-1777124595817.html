<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message For You</title>
    <style>
        body {
            background-color: #fff0f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 { color: #ff4d6d; }
        p { color: #590d22; line-height: 1.6; font-size: 1.2rem; }
        .heart { color: #ff4d6d; font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">❤</div>
        <h1>Hey [Name],</h1>
        <p>
            I've wanted to tell you this for a while...<br><br>
            [Write your heartfelt confession here. Be honest, be you.]
        </p>
        <p>— [Your Name]</p>
    </div>
</body>
</html>
